replicaCount: 1
revisionHistoryLimit: 2

image:
  repository: ""
  digest: ""
  pullPolicy: IfNotPresent
imagePullSecrets: []

publicURL: ""
publicHost: ""

content:
  existingClaim: ""
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  size: 2Gi
  annotations: {}

tls:
  secretName: ""
  certificateKey: tls.crt
  privateKeyKey: tls.key
  caBundleKey: ca.crt

service:
  type: ClusterIP
  port: 443
  annotations: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  tlsSecretName: ""

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: "1"
    memory: 256Mi

podAnnotations: {}
podLabels: {}
nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []

networkPolicy:
  enabled: false
  ingressFrom: []
