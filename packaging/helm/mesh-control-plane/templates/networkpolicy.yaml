{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "mesh-control-plane.fullname" . }}
  labels:
    {{- include "mesh-control-plane.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "mesh-control-plane.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        {{- toYaml .Values.networkPolicy.ingressFrom | nindent 8 }}
      ports:
        - protocol: TCP
          port: 8443
{{- end }}
