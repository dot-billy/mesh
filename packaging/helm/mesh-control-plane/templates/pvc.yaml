{{- if and (eq .Values.storage.backend "json") (not .Values.storage.persistence.existingClaim) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "mesh-control-plane.fullname" . }}
  labels:
    {{- include "mesh-control-plane.labels" . | nindent 4 }}
  {{- with .Values.storage.persistence.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  accessModes:
    {{- toYaml .Values.storage.persistence.accessModes | nindent 4 }}
  resources:
    requests:
      storage: {{ .Values.storage.persistence.size }}
  {{- with .Values.storage.persistence.storageClass }}
  storageClassName: {{ . | quote }}
  {{- end }}
{{- end }}
